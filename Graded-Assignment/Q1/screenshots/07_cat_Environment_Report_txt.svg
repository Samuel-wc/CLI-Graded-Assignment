<text x="24" y="58" font-family="DejaVu Sans Mono, Consolas, monospace" font-size="14" fill="#e5e7eb">
<tspan x="24" dy="0">$ cat Environment_Report.txt</tspan>
<tspan x="24" dy="18">Exit status: 0</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">Environment Verification Report</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">1. User Identity</tspan>
<tspan x="24" dy="18">The id command was used to display user and group information.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">2. Active Shell</tspan>
<tspan x="24" dy="18">The echo $SHELL command displayed the active shell.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">3. Current Directory</tspan>
<tspan x="24" dy="18">The pwd command displayed the current working directory.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">4. Directory Listing</tspan>
<tspan x="24" dy="18">The ls -la command displayed files and directories.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">5. Network Verification</tspan>
<tspan x="24" dy="18">The ping command verified internet connectivity.</tspan>
</text>
