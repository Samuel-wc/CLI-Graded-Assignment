<text x="24" y="58" font-family="DejaVu Sans Mono, Consolas, monospace" font-size="14" fill="#e5e7eb">
<tspan x="24" dy="0">$ cat observations.txt</tspan>
<tspan x="24" dy="18">Exit status: 0</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">1. id</tspan>
<tspan x="24" dy="18">This command displayed the current user&#x27;s identity information.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">2. echo $SHELL</tspan>
<tspan x="24" dy="18">This command displayed the active shell being used.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">3. pwd</tspan>
<tspan x="24" dy="18">This command displayed the current working directory.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">4. ls -la</tspan>
<tspan x="24" dy="18">This command displayed files, folders and hidden files.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">5. ping -c 4 google.com</tspan>
<tspan x="24" dy="18">This command tested internet connectivity and verified network communication.</tspan>
