<circle cx="22" cy="16" r="5" fill="#ef4444"/>
<circle cx="40" cy="16" r="5" fill="#f59e0b"/>
<circle cx="58" cy="16" r="5" fill="#10b981"/>
<text x="24" y="58" font-family="DejaVu Sans Mono, Consolas, monospace" font-size="14" fill="#e5e7eb">
<tspan x="24" dy="0">$ cat observations.txt</tspan>
<tspan x="24" dy="18">Exit status: 0</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">1. mkdir</tspan>
<tspan x="24" dy="18">The mkdir command created the workspace folders.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">2. ls -ld</tspan>
<tspan x="24" dy="18">The ls -ld command showed permissions and ownership.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">3. chmod 700</tspan>
<tspan x="24" dy="18">The chmod command restricted access to the directory.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">4. umask</tspan>
<tspan x="24" dy="18">The umask command displayed the default permission mask.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">5. Ownership</tspan>
<tspan x="24" dy="18">Ownership confirmed that the current user controls the workspace.</tspan>
</text>
</svg>