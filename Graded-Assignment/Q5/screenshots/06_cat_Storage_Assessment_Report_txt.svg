<svg xmlns="http://www.w3.org/2000/svg" width="760" height="468" viewBox="0 0 760 468">
<rect width="100%" height="100%" rx="8" fill="#111827"/>
<rect x="0" y="0" width="100%" height="32" rx="8" fill="#1f2937"/>
<circle cx="22" cy="16" r="5" fill="#ef4444"/>
<circle cx="40" cy="16" r="5" fill="#f59e0b"/>
<circle cx="58" cy="16" r="5" fill="#10b981"/>
<text x="24" y="58" font-family="DejaVu Sans Mono, Consolas, monospace" font-size="14" fill="#e5e7eb">
<tspan x="24" dy="0">$ cat Storage_Assessment_Report.txt</tspan>
<tspan x="24" dy="18">Exit status: 0</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">Storage Health Assessment Report</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">1. Available Storage Devices</tspan>
<tspan x="24" dy="18">The lsblk command displayed block devices and partition information.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">2. Mounted File Systems</tspan>
<tspan x="24" dy="18">The df -h command displayed mounted file systems, sizes and usage.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">3. Disk Usage</tspan>
<tspan x="24" dy="18">The du -sh command summarized the storage used by the home directory.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">4. Inode Utilization</tspan>
<tspan x="24" dy="18">The df -i command displayed inode usage statistics.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">5. Storage Health</tspan>
<tspan x="24" dy="18">The storage system appeared operational and accessible.</tspan>
<tspan x="24" dy="18"></tspan>
<tspan x="24" dy="18">6. Recommendations</tspan>
<tspan x="24" dy="18">Remove unnecessary files, archive old data, and monitor disk and inode usage regularly.</tspan>
</text>
</svg>